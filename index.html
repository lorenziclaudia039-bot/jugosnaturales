<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>La Poción</title>

<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
:root {
  --bg: #f7f1e8;
  --bg-soft: #fffaf4;
  --green: #4f6f52;
  --green-dark: #35543a;
  --gold: #d6a84f;
  --terracotta: #c9825c;
  --text: #4a372d;
  --card: #fffdf9;
  --line: #eadfce;
  --shadow: 0 15px 35px rgba(91, 67, 48, 0.08);
}

/* BASE */
body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  background: linear-gradient(180deg,#f7f1e8,#fffaf4);
  color: var(--text);
}

/* HEADER */
header {
  text-align: center;
  padding: 80px 20px 50px;
  background: radial-gradient(circle,#fffaf4,#f7f1e8);
}

.logo {
  width: 260px;
  margin-bottom: 15px;
  filter: drop-shadow(0 12px 25px rgba(0,0,0,0.08));
}

.tagline {
  font-size: 1.1rem;
}

/* LAYOUT */
.container {
  max-width: 1100px;
  margin: auto;
  padding: 30px 20px 70px;
}

.card {
  background: var(--card);
  border-radius: 25px;
  padding: 30px;
  box-shadow: var(--shadow);
  margin-bottom: 25px;
  border: 1px solid var(--line);
}

h2 {
  text-align: center;
  font-family: 'DM Serif Display', serif;
  color: var(--green-dark);
}

/* INPUT */
input, textarea {
  width: 100%;
  border: 1px solid var(--line);
  border-radius: 12px;
  padding: 14px;
  text-align: center;
}

/* BOTELLAS */
@keyframes float {
  0% { transform: translateY(0px); }
  50% { transform: translateY(-4px); }
  100% { transform: translateY(0px); }
}

.bottle-icon {
  width: 80px;
  height: 90px;
  object-fit: contain;
  display: block;
  margin: 0 auto 12px;
  transition: all 0.3s ease;
  filter: drop-shadow(0 10px 18px rgba(0,0,0,0.10));
  animation: float 4s ease-in-out infinite;
  mix-blend-mode: multiply;
}

/* CARDS */
.sizes {
  display: grid;
  grid-template-columns: repeat(auto-fit,minmax(260px,1fr));
  gap: 20px;
}

.size-card {
  text-align: center;
  padding: 25px;
  border-radius: 20px;
  background: white;
  box-shadow: var(--shadow);
  position: relative;
  overflow: hidden;
  transition: 0.3s;
}

.size-card::after {
  content: "";
  position: absolute;
  top: 20px;
  left: 50%;
  transform: translateX(-50%);
  width: 130px;
  height: 130px;
  background: radial-gradient(circle, rgba(255,250,244,0.9) 0%, rgba(255,250,244,0) 70%);
  pointer-events: none;
}

.size-card:hover {
  transform: translateY(-4px);
}

.size-card:hover .bottle-icon {
  transform: translateY(-3px) scale(1.05);
  filter:
    drop-shadow(0 12px 22px rgba(0,0,0,0.14))
    drop-shadow(0 0 10px rgba(214,168,79,0.28));
}

.size-12 h3 { color: var(--green-dark); }
.size-16 h3 { color: var(--gold); }
.size-24 h3 { color: var(--terracotta); }

/* BUTTON */
button {
  border: none;
  padding: 12px;
  border-radius: 999px;
  color: white;
  width: 100%;
  cursor: pointer;
  font-weight: 600;
  transition: 0.25s;
}

button:hover {
  transform: translateY(-2px);
  box-shadow: 0 10px 18px rgba(0,0,0,0.12);
}

.size-12 button { background: var(--green); }
.size-16 button { background: var(--gold); }
.size-24 button { background: var(--terracotta); }

/* RESUMEN */
.summary { text-align:center; }
.total { font-size:1.4rem; margin-top:10px; color:var(--green-dark); }

.bottle-item {
  margin-top: 15px;
  border: 1px solid var(--line);
  border-radius: 15px;
  padding: 15px;
}

.ingredients-grid {
  display: grid;
  grid-template-columns: repeat(2,1fr);
  gap: 10px;
}
</style>
</head>

<body>

<header>
  <img src="images/logo.png" class="logo">
  <p class="tagline">Jugos hechos a tu gusto, con ingredientes naturales.</p>
</header>

<div class="container">

<div class="card">
  <h2>Haz tu poción</h2>
</div>

<div class="card">
  <input type="text" id="customerName" placeholder="Tu nombre">
</div>

<div class="sizes">

  <div class="size-card size-12">
    <img src="images/bottle-12.png" class="bottle-icon">
    <h3>12 oz</h3>
    <button onclick="addBottle(12)">Añadir</button>
    <div id="list-12"></div>
  </div>

  <div class="size-card size-16">
    <img src="images/bottle-16.png" class="bottle-icon">
    <h3>16 oz</h3>
    <button onclick="addBottle(16)">Añadir</button>
    <div id="list-16"></div>
  </div>

  <div class="size-card size-24">
    <img src="images/bottle-24.png" class="bottle-icon">
    <h3>24 oz</h3>
    <button onclick="addBottle(24)">Añadir</button>
    <div id="list-24"></div>
  </div>

</div>

<div class="card summary">
  <h2>Resumen</h2>
  <div id="summary">Aquí verás tu pedido.</div>
  <div class="total" id="total">$0.00</div>
  <button onclick="sendOrder()">Enviar por WhatsApp</button>
</div>

</div>

<script>
const PHONE="19398813322";
const BASE={12:12,16:15,24:18};
let bottles=[];

function addBottle(size){
  bottles.push(size);
  update();
}

function update(){
  let text="";
  let total=0;

  bottles.forEach((b,i)=>{
    text+=`Botella ${i+1} (${b}oz)\n`;
    total+=BASE[b];
  });

  document.getElementById("summary").innerText=text||"Aquí verás tu pedido.";
  document.getElementById("total").innerText="$"+total.toFixed(2);
}

function sendOrder(){
  let message="Hola, quiero ordenar:\n\n"+document.getElementById("summary").innerText+"\nTotal: "+document.getElementById("total").innerText;
  window.open(`https://wa.me/${PHONE}?text=${encodeURIComponent(message)}`);
}
</script>

</body>
</html>
