<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>La Poción</title>

  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #f7f1e8;
      --bg-soft: #fffaf4;
      --green: #4f6f52;
      --green-dark: #35543a;
      --gold: #d6a84f;
      --text: #4a372d;
      --card: #fffdf9;
      --line: #eadfce;
      --shadow: 0 12px 30px rgba(91, 67, 48, 0.08);
      --radius-xl: 26px;
    }

    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      background: linear-gradient(180deg, var(--bg) 0%, var(--bg-soft) 100%);
      color: var(--text);
    }

    /* 🔥 HERO PREMIUM */
    header {
      background: radial-gradient(circle at top, #fffaf4, #f7f1e8);
      text-align: center;
      padding: 80px 20px 60px;
    }

    .logo {
      width: 260px;
      max-width: 80%;
      display: block;
      margin: 0 auto 20px;
      filter: drop-shadow(0 15px 30px rgba(0,0,0,0.08));
    }

    .tagline {
      font-size: 1.1rem;
      max-width: 500px;
      margin: 0 auto;
      line-height: 1.6;
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 40px 20px 80px;
    }

    .card {
      background: var(--card);
      border-radius: var(--radius-xl);
      padding: 30px;
      box-shadow: var(--shadow);
      margin-bottom: 25px;
      border: 1px solid var(--line);
    }

    h2 {
      text-align: center;
      font-family: 'DM Serif Display', serif;
      color: var(--green-dark);
      margin-top: 0;
    }

    input {
      width: 100%;
      max-width: 400px;
      margin: 0 auto;
      display: block;
      padding: 14px;
      border-radius: 12px;
      border: 1px solid var(--line);
      text-align: center;
    }

    .sizes {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 20px;
    }

    .size-card {
      text-align: center;
      padding: 25px;
      border-radius: 20px;
      background: white;
      box-shadow: var(--shadow);
    }

    .price {
      font-weight: bold;
      margin: 10px 0;
    }

    button {
      background: var(--green);
      color: white;
      border: none;
      padding: 12px 18px;
      border-radius: 999px;
      cursor: pointer;
      width: 100%;
    }

    .summary {
      text-align: center;
    }

    .total {
      font-size: 1.4rem;
      margin-top: 10px;
      color: var(--green-dark);
    }

    .whatsapp {
      margin-top: 15px;
    }
  </style>
</head>

<body>

  <!-- 🔥 HEADER PREMIUM -->
  <header>
    <img src="logo.png" class="logo" alt="La Poción Logo">
    <p class="tagline">Jugos hechos a tu gusto, con ingredientes naturales.</p>
  </header>

  <div class="container">

    <div class="card">
      <h2>Haz tu poción</h2>
      <p style="text-align:center;">
        Escoge el tamaño. Incluye hasta 3 ingredientes. Extras desde $2.
      </p>
    </div>

    <div class="card">
      <input type="text" placeholder="Tu nombre">
    </div>

    <div class="sizes">

      <div class="size-card">
        <h3>12 oz</h3>
        <div class="price">$12</div>
        <button>Añadir</button>
      </div>

      <div class="size-card">
        <h3>16 oz</h3>
        <div class="price">$15</div>
        <button>Añadir</button>
      </div>

      <div class="size-card">
        <h3>24 oz</h3>
        <div class="price">$18</div>
        <button>Añadir</button>
      </div>

    </div>

    <div class="card summary">
      <h2>Resumen</h2>
      <p>Aquí verás tu pedido.</p>
      <div class="total">$0.00</div>
      <button class="whatsapp">Enviar por WhatsApp</button>
    </div>

  </div>

</body>
</html>
