<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>La Poción</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(#f5f3ee, #e8e2d8);
      text-align: center;
      color: #333;
    }

    .container {
      padding: 20px;
    }

    .logo {
      width: 120px;
      margin-bottom: 10px;
    }

    h1 {
      margin: 10px 0;
    }

    .subtitle {
      font-size: 14px;
      color: #666;
      margin-bottom: 30px;
    }

    .bottles {
      display: flex;
      justify-content: center;
      gap: 20px;
      flex-wrap: wrap;
    }

    .bottle {
      cursor: pointer;
      transition: transform 0.3s ease;
    }

    .bottle:hover {
      transform: scale(1.05);
    }

    .bottle img {
      width: 100px;
      border-radius: 20px;
    }

    .selected {
      outline: 3px solid #c9a86a;
      border-radius: 20px;
    }

    .ingredients {
      margin-top: 30px;
      display: none;
    }

    .ingredients button {
      margin: 5px;
      padding: 10px 15px;
      border: none;
      border-radius: 20px;
      background: #d8cbb3;
      cursor: pointer;
    }

    .ingredients button.active {
      background: #a68b5b;
      color: white;
    }

    .extra {
      color: #a33;
      margin-top: 10px;
      display: none;
    }

    .notes {
      margin-top: 15px;
    }

    input {
      padding: 10px;
      width: 80%;
      border-radius: 10px;
      border: 1px solid #ccc;
    }

    .summary {
      margin-top: 20px;
      font-weight: bold;
    }

    .cta {
      margin-top: 20px;
    }

    .cta a {
      background: #6b8e23;
      color: white;
      padding: 12px 20px;
      border-radius: 25px;
      text-decoration: none;
      display: inline-block;
    }

  </style>
</head>

<body>

<div class="container">

  <!-- LOGO -->
  <img src="images/logo.png" class="logo">

  <h1>Haz tu poción</h1>
  <p class="subtitle">
    Escoge tu tamaño. Incluye hasta 3 ingredientes. Extras desde $2.
  </p>

  <!-- BOTELLAS -->
  <div class="bottles">
    <div class="bottle" onclick="selectBottle(12, 12, this)">
      <img src="images/bottle-12.png">
      <p>12 oz<br>$12</p>
    </div>

    <div class="bottle" onclick="selectBottle(16, 15, this)">
      <img src="images/bottle-16.png">
      <p>16 oz<br>$15</p>
    </div>

    <div class="bottle" onclick="selectBottle(24, 18, this)">
      <img src="images/bottle-24.png">
      <p>24 oz<br>$18</p>
    </div>
  </div>

  <!-- INGREDIENTES -->
  <div class="ingredients" id="ingredients">
    <h3>Elige tus ingredientes</h3>

    <div id="ingredientButtons">
      <button onclick="toggleIngredient(this)">Zanahoria</button>
      <button onclick="toggleIngredient(this)">China</button>
      <button onclick="toggleIngredient(this)">Jengibre</button>
      <button onclick="toggleIngredient(this)">Cúrcuma</button>
      <button onclick="toggleIngredient(this)">Limón</button>
      <button onclick="toggleIngredient(this)">Piña</button>
    </div>

    <div class="extra" id="extraMsg">
      Ingrediente adicional +$2
    </div>

    <div class="notes">
      <input type="text" placeholder="¿Algo adicional o custom?" id="notes">
    </div>

    <div class="summary" id="summary"></div>

    <div class="cta">
      <a id="orderBtn" href="#" target="_blank">Ordenar por WhatsApp</a>
    </div>

  </div>

</div>

<script>
let selectedBottle = null;
let basePrice = 0;
let selectedIngredients = [];

function selectBottle(size, price, el) {
  selectedBottle = size;
  basePrice = price;
  selectedIngredients = [];

  document.querySelectorAll('.bottle').forEach(b => b.classList.remove('selected'));
  el.classList.add('selected');

  document.getElementById('ingredients').style.display = 'block';

  document.querySelectorAll('#ingredientButtons button').forEach(btn => {
    btn.classList.remove('active');
  });

  updateSummary();
}

function toggleIngredient(btn) {
  const name = btn.innerText;

  if (selectedIngredients.includes(name)) {
    selectedIngredients = selectedIngredients.filter(i => i !== name);
    btn.classList.remove('active');
  } else {
    selectedIngredients.push(name);
    btn.classList.add('active');
  }

  updateSummary();
}

function updateSummary() {
  let extraCost = 0;

  if (selectedIngredients.length > 3) {
    extraCost = (selectedIngredients.length - 3) * 2;
    document.getElementById('extraMsg').style.display = 'block';
  } else {
    document.getElementById('extraMsg').style.display = 'none';
  }

  let total = basePrice + extraCost;

  document.getElementById('summary').innerText =
    `Total: $${total} | Ingredientes: ${selectedIngredients.join(', ')}`;

  let notes = document.getElementById('notes').value;

  let message = `Hola! Quiero ordenar:\n${selectedBottle} oz\nIngredientes: ${selectedIngredients.join(', ')}\nNotas: ${notes}\nTotal: $${total}`;

  document.getElementById('orderBtn').href =
    `https://wa.me/?text=${encodeURIComponent(message)}`;
}
</script>

</body>
</html>
