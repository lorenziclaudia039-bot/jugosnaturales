<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>La Poción</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  font-family: Arial, sans-serif;
  margin: 0;
  background: #f8f4ee;
  color: #3e2f26;
}

header {
  text-align: center;
  padding: 60px 20px;
  background: #dfead7;
}

h1, h2, h3, p, label {
  text-align: center;
}

.container {
  max-width: 900px;
  margin: auto;
  padding: 30px;
}

.card {
  background: white;
  padding: 20px;
  border-radius: 15px;
  margin-bottom: 20px;
}

button {
  width: 100%;
  padding: 12px;
  border: none;
  border-radius: 10px;
  background: #355e3b;
  color: white;
  margin-top: 10px;
  cursor: pointer;
}

.bottle {
  border: 1px solid #ddd;
  border-radius: 10px;
  padding: 15px;
  margin-top: 15px;
}

.ingredients {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
}

.ingredients label {
  display: flex;
  justify-content: center;
  gap: 5px;
}

.total {
  margin-top: 10px;
  font-weight: bold;
  text-align: center;
}
</style>
</head>

<body>

<header>
<h1>La Poción</h1>
<p>Jugos hecho a tu gusto, completamente naturales.</p>
</header>

<div class="container">

<div class="card">
<h2>Haz tu pedido</h2>
<p>
Escoge el tamaño que desees. Cada botella incluye hasta tres ingredientes.  
Luego tendrá un costo adicional comenzando en $2.
</p>
</div>

<div class="card">
<label>Tu nombre</label>
<input id="name">
</div>

<div class="card">
<h2>12 oz - $12</h2>
<button onclick="addBottle(12)">Añadir botella</button>
<div id="b12"></div>
</div>

<div class="card">
<h2>16 oz - $15</h2>
<button onclick="addBottle(16)">Añadir botella</button>
<div id="b16"></div>
</div>

<div class="card">
<h2>24 oz - $18</h2>
<button onclick="addBottle(24)">Añadir botella</button>
<div id="b24"></div>
</div>

<div class="card">
<h2>Entrega</h2>
<p>Miércoles de 3pm a 6pm en Montehiedra</p>
</div>

<div class="card">
<h2>Resumen</h2>
<div id="summary"></div>
<div class="total" id="grand"></div>
<button onclick="send()">Enviar por WhatsApp</button>
</div>

</div>

<script>
const prices = {12:12,16:15,24:18};
let count = 0;

function addBottle(size){
  count++;

  let div = document.createElement("div");
  div.className = "bottle";

  div.innerHTML = `
    <h3>Botella ${size} oz</h3>

    <div class="ingredients">
      <label><input type="checkbox">Jengibre</label>
      <label><input type="checkbox">Limón</label>
      <label><input type="checkbox">China</label>
      <label><input type="checkbox">Zanahoria</label>
      <label><input type="checkbox">Cúrcuma</label>
      <label><input type="checkbox">Piña</label>
    </div>

    <textarea placeholder="Otros"></textarea>

    <div class="total">$${prices[size]}</div>
  `;

  div.querySelectorAll("input").forEach(el=>{
    el.addEventListener("change",()=>calc(div,size));
  });

  document.getElementById("b"+size).appendChild(div);
}

function calc(div,size){
  let checks = div.querySelectorAll("input:checked").length;
  let extra = Math.max(0,checks-3);
  let total = prices[size] + (extra*2);

  div.querySelector(".total").innerText = "$"+total;
  update();
}

function update(){
  let total = 0;
  let summary = "";

  document.querySelectorAll(".bottle").forEach(b=>{
    let price = b.querySelector(".total").innerText;
    total += parseInt(price.replace("$",""));
    summary += price+"\n";
  });

  document.getElementById("summary").innerText = summary;
  document.getElementById("grand").innerText = "Total: $"+total;
}

function send(){
  let text = document.getElementById("summary").innerText;
  window.open(`https://wa.me/19398813322?text=${encodeURIComponent(text)}`);
}
</script>

</body>
</html>
